name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject API key
        run: sed -i "s/__OPENAI_API_KEY__/${{ secrets.OPENAI_API_KEY }}/g" index.html

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload everything — Pages will serve index.html, article.html, etc.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
