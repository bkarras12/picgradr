<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicGradr — Dating Profile Photo Grader</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:    #C94B2D;
            --cream:  #F2EDE4;
            --dark:   #1C1C1C;
            --white:  #FFFFFF;
            --mid:    #888;
            --hh:     52px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--white);
            color: var(--dark);
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--hh);
            background: var(--red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }

        .logo {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        header nav { display: flex; gap: 28px; }

        header nav a {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        header nav a:hover { color: #fff; }

        /* ── Upload section ── */
        #uploadSection {
            display: flex;
            min-height: 100vh;
            padding-top: var(--hh);
        }

        .upload-left {
            flex: 0 0 55%;
            background: var(--cream);
            padding: 72px 64px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .upload-right {
            flex: 0 0 45%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3px;
            background: #ddd;
            min-height: calc(100vh - var(--hh));
        }

        .photo-wrap {
            position: relative;
            overflow: hidden;
        }

        .photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--red);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Headline */
        .headline {
            font-size: 3.4rem;
            font-weight: 900;
            line-height: 1.03;
            color: var(--dark);
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        .subhead {
            font-size: 1rem;
            color: #666;
            line-height: 1.65;
            max-width: 360px;
            margin-bottom: 52px;
        }

        /* Upload form */
        #errorMsg {
            display: none;
            border-left: 3px solid var(--red);
            background: #fde8e8;
            color: #7a1a1a;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.82rem;
        }

        .drop-zone {
            border: 2px dashed #bbb;
            padding: 44px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.45);
        }

        .drop-zone:hover { border-color: var(--red); background: rgba(255,255,255,0.7); }

        .drop-zone-icon { font-size: 2rem; margin-bottom: 10px; }

        .drop-zone-text {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            color: #666;
            letter-spacing: 0.02em;
        }

        #fileInput { display: none; }

        #fileName {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            color: var(--red);
            min-height: 20px;
            margin-bottom: 20px;
        }

        .btn-grade {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-grade:hover:not(:disabled) { background: var(--red); }
        .btn-grade:disabled { opacity: 0.38; cursor: not-allowed; }

        /* ── Loading ── */
        #loading {
            display: none;
            min-height: calc(100vh - var(--hh));
            padding-top: var(--hh);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: var(--cream);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(201,75,45,0.18);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading p {
            font-family: 'Roboto Mono', monospace;
            color: #555;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* ── Results ── */
        #results { display: none; padding-top: var(--hh); }

        .results-hero {
            background: var(--cream);
            padding: 72px 64px;
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

        .results-photo { flex-shrink: 0; }

        #previewImg {
            width: 220px;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        .results-copy { flex: 1; padding-top: 4px; }

        .results-eyebrow {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 8px;
        }

        .overall-grade {
            font-size: 9rem;
            font-weight: 900;
            line-height: 1;
            color: var(--dark);
            letter-spacing: -0.06em;
            margin-bottom: 24px;
        }

        #summaryText {
            font-size: 1rem;
            color: #444;
            line-height: 1.72;
            max-width: 460px;
        }

        /* Metrics */
        .metrics-section {
            padding: 60px 64px;
            background: var(--white);
        }

        .metrics-eyebrow {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--mid);
            padding-bottom: 14px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 32px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            border: 1px solid #e4e4e4;
        }

        .metric-card {
            padding: 28px 24px;
            border-right: 1px solid #e4e4e4;
            border-bottom: 1px solid #e4e4e4;
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .metric-letter {
            flex-shrink: 0;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1;
            width: 40px;
            color: var(--dark);
        }

        .metric-letter.grade-A { color: #2E7D32; }
        .metric-letter.grade-B { color: #558B2F; }
        .metric-letter.grade-C { color: #E65100; }
        .metric-letter.grade-D { color: #BF360C; }
        .metric-letter.grade-F { color: #B71C1C; }

        .metric-label {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .metric-feedback { font-size: 0.87rem; color: #555; line-height: 1.58; }

        /* Results footer */
        .results-footer {
            background: var(--dark);
            padding: 36px 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .results-footer-note {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
        }

        .btn-reset {
            padding: 13px 32px;
            background: var(--red);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-reset:hover { opacity: 0.82; }

        /* ── Footer ── */
        footer {
            background: var(--dark);
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 3px solid var(--red);
        }

        footer span {
            font-family: 'Roboto Mono', monospace;
            color: rgba(255,255,255,0.3);
            font-size: 0.72rem;
        }

        footer a {
            font-family: 'Roboto Mono', monospace;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.72rem;
            letter-spacing: 0.06em;
        }

        footer a:hover { color: #fff; }

        /* ── Mobile ── */
        @media (max-width: 800px) {
            #uploadSection { flex-direction: column; }
            .upload-left { padding: 48px 28px; flex: none; }
            .upload-right { flex: none; min-height: 280px; grid-template-rows: 140px 140px; }
            .headline { font-size: 2.4rem; }
            .results-hero { flex-direction: column; padding: 48px 28px; gap: 32px; }
            #previewImg { width: 100%; height: 240px; }
            .metrics-section { padding: 40px 28px; }
            .results-footer { flex-direction: column; gap: 16px; padding: 32px 28px; }
            footer { padding: 18px 28px; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="/">PICGRADR _</a>
    <nav>
        <a href="article.html">Articles</a>
        <a href="information.html">Info</a>
    </nav>
</header>

<!-- Upload section -->
<div id="uploadSection">
    <div class="upload-left">
        <div id="errorMsg"></div>
        <h1 class="headline">Make your first impression count.</h1>
        <p class="subhead">Upload your dating profile photo and get honest, AI-powered feedback on what's working — and what to improve.</p>

        <label class="drop-zone" for="fileInput">
            <div class="drop-zone-icon">📷</div>
            <div class="drop-zone-text">Click to select a photo &mdash; JPG, PNG, WEBP</div>
        </label>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp">
        <div id="fileName"></div>
        <button class="btn-grade" id="gradeBtn" disabled>Analyze Photo &rarr;</button>
    </div>

    <div class="upload-right">
        <div class="photo-wrap">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=600&q=80" alt="Example profile — grade A">
            <div class="photo-badge">A</div>
        </div>
        <div class="photo-wrap">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80" alt="Example profile — grade B">
            <div class="photo-badge">B</div>
        </div>
        <div class="photo-wrap">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600&q=80" alt="Example profile — grade A">
            <div class="photo-badge">A</div>
        </div>
        <div class="photo-wrap">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600&q=80" alt="Example profile — grade C">
            <div class="photo-badge">C</div>
        </div>
    </div>
</div>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
    <p>Analyzing your photo&hellip;</p>
</div>

<!-- Results -->
<div id="results">
    <div class="results-hero">
        <div class="results-photo">
            <img id="previewImg" src="" alt="Your uploaded photo">
        </div>
        <div class="results-copy">
            <div class="results-eyebrow">Overall Grade</div>
            <div class="overall-grade" id="overallGrade">—</div>
            <p id="summaryText"></p>
        </div>
    </div>

    <div class="metrics-section">
        <div class="metrics-eyebrow">Breakdown</div>
        <div class="metrics-grid" id="metricsGrid"></div>
    </div>

    <div class="results-footer">
        <span class="results-footer-note">PicGradr &mdash; AI photo analysis</span>
        <button class="btn-reset" id="resetBtn">Grade Another &rarr;</button>
    </div>
</div>

<footer>
    <span>&copy; 2025 PicGradr</span>
    <a href="information.html">More Information</a>
</footer>

<script>
    const OPENAI_API_KEY = '__OPENAI_API_KEY__';

    const fileInput     = document.getElementById('fileInput');
    const fileName      = document.getElementById('fileName');
    const gradeBtn      = document.getElementById('gradeBtn');
    const uploadSection = document.getElementById('uploadSection');
    const loading       = document.getElementById('loading');
    const results       = document.getElementById('results');
    const errorMsg      = document.getElementById('errorMsg');
    const resetBtn      = document.getElementById('resetBtn');

    const METRIC_LABELS = {
        lighting:    'Lighting',
        composition: 'Composition',
        clarity:     'Clarity',
        background:  'Background',
        expression:  'Expression',
    };

    const SCHEMA = {
        type: 'object',
        properties: {
            lighting:             { type: 'string', enum: ['A','B','C','D','F'] },
            lighting_feedback:    { type: 'string' },
            composition:          { type: 'string', enum: ['A','B','C','D','F'] },
            composition_feedback: { type: 'string' },
            clarity:              { type: 'string', enum: ['A','B','C','D','F'] },
            clarity_feedback:     { type: 'string' },
            background:           { type: 'string', enum: ['A','B','C','D','F'] },
            background_feedback:  { type: 'string' },
            expression:           { type: 'string', enum: ['A','B','C','D','F'] },
            expression_feedback:  { type: 'string' },
            overall:              { type: 'string', enum: ['A','B','C','D','F'] },
            summary:              { type: 'string' },
        },
        required: [
            'lighting','lighting_feedback',
            'composition','composition_feedback',
            'clarity','clarity_feedback',
            'background','background_feedback',
            'expression','expression_feedback',
            'overall','summary',
        ],
        additionalProperties: false,
    };

    const PROMPT = `You are an expert dating profile photo evaluator. Grade the photo across 5 metrics using A–F letter grades (A=excellent, B=good, C=average, D=poor, F=unacceptable).

Metrics:
1. Lighting — Is the subject well-lit? Natural or flattering light? Harsh shadows or overexposure?
2. Composition — Is the subject well-framed? Is the crop flattering? Good use of space?
3. Clarity — Is the image sharp and in focus? High resolution? Any motion blur?
4. Background — Is the background clean and non-distracting? Appropriate for a dating profile?
5. Expression — Does the subject look approachable, confident, genuine? Natural smile?

Be honest but constructive. Give specific, actionable feedback for each metric.
For "overall", consider the photo holistically as a dating profile image.
For "summary", write 2–3 sentences with the top takeaway and one key improvement tip.`;

    fileInput.addEventListener('change', () => {
        fileName.textContent = fileInput.files.length > 0 ? fileInput.files[0].name : '';
        gradeBtn.disabled = fileInput.files.length === 0;
    });

    gradeBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        hideError();
        uploadSection.style.display = 'none';
        loading.style.display = 'flex';
        results.style.display = 'none';

        const reader = new FileReader();
        reader.onload = e => { document.getElementById('previewImg').src = e.target.result; };
        reader.readAsDataURL(file);

        try {
            const base64 = await fileToBase64(file);
            const data = await gradePhoto(OPENAI_API_KEY, base64, file.type);
            displayResults(data);
        } catch (err) {
            loading.style.display = 'none';
            uploadSection.style.display = 'flex';
            showError(err.message || 'Something went wrong. Please try again.');
        }
    });

    resetBtn.addEventListener('click', () => {
        results.style.display = 'none';
        uploadSection.style.display = 'flex';
        fileInput.value = '';
        fileName.textContent = '';
        gradeBtn.disabled = true;
        hideError();
    });

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function gradePhoto(apiKey, base64Data, mimeType) {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
                model: 'gpt-4o',
                messages: [{
                    role: 'user',
                    content: [
                        { type: 'image_url', image_url: { url: `data:${mimeType};base64,${base64Data}` } },
                        { type: 'text', text: PROMPT },
                    ],
                }],
                response_format: {
                    type: 'json_schema',
                    json_schema: { name: 'photo_grades', strict: true, schema: SCHEMA },
                },
            }),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err?.error?.message || `OpenAI error ${resp.status}`);
        }

        const json = await resp.json();
        return JSON.parse(json.choices[0].message.content);
    }

    function displayResults(data) {
        loading.style.display = 'none';

        document.getElementById('overallGrade').textContent = data.overall;
        document.getElementById('summaryText').textContent = data.summary;

        const grid = document.getElementById('metricsGrid');
        grid.innerHTML = '';
        for (const [key, label] of Object.entries(METRIC_LABELS)) {
            const grade = data[key];
            const card = document.createElement('div');
            card.className = 'metric-card';
            card.innerHTML = `
                <div class="metric-letter grade-${grade}">${grade}</div>
                <div>
                    <div class="metric-label">${label}</div>
                    <div class="metric-feedback">${data[key + '_feedback']}</div>
                </div>
            `;
            grid.appendChild(card);
        }

        results.style.display = 'block';
    }

    function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
    function hideError() { errorMsg.style.display = 'none'; }
</script>

</body>
</html>
